services:
  db:
    image: postgres:16
    container_name: tinytasks-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: tinytasks-backend:dev
    container_name: tinytasks-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      # App will read DATABASE_URL from env; Alembic too (entrypoint)
      DATABASE_URL: postgresql+psycopg2://tinytasks:tinytasks@db:5432/tinytasks
    ports:
      - "8080:8080"   
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: tinytasks-frontend:dev
    container_name: tinytasks-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"   
volumes:
  db_data: